<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#08090d">
    <title>Moodify Song Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #090a15;
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(15, 23, 42, 0.68);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }
        .filter-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.8rem;
            border-radius: 9999px;
            background: rgba(99, 102, 241, 0.15);
            color: #e2e8f0;
            font-size: 0.85rem;
            border: 1px solid rgba(99, 102, 241, 0.22);
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        input, select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #f8fafc;
        }
        select {
            color-scheme: dark;
            cursor: pointer;
            background-color: rgba(15, 23, 42, 0.92);
            background-image:
                linear-gradient(45deg, transparent 50%, #c4b5fd 50%),
                linear-gradient(135deg, #c4b5fd 50%, transparent 50%);
            background-position:
                calc(100% - 20px) 50%,
                calc(100% - 14px) 50%;
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
            padding-right: 2.75rem;
            appearance: none;
        }
        select:hover {
            background-color: rgba(30, 41, 59, 0.96);
            border-color: rgba(167, 139, 250, 0.46);
        }
        select option {
            background: #111827;
            color: #f8fafc;
        }
        select option:checked,
        select option:hover {
            background: #5b21b6;
            color: #ffffff;
        }
        input::placeholder {
            color: rgba(226, 232, 240, 0.6);
        }
        .split-grid {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) minmax(240px, 1fr);
            gap: 1rem;
        }
        @media (max-width: 900px) {
            .split-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="min-h-screen px-4 py-6 sm:px-6 lg:px-10">
        <div class="max-w-7xl mx-auto space-y-6">
            <header class="glass rounded-[2rem] p-8 shadow-xl shadow-slate-900/20">
                <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-[0.3em] text-slate-400 mb-3">Moodify Library</p>
                        <h1 class="text-4xl font-extrabold tracking-tight text-white">Browse all songs</h1>
                        <p class="mt-3 max-w-2xl text-slate-300">Explore every track in the collection with live filters for genre, language, mood and release era.</p>
                    </div>
                    <div class="text-right text-slate-400">
                        <p class="text-sm">Loaded songs</p>
                        <p id="song-count" class="text-3xl font-bold text-white">0</p>
                    </div>
                </div>
            </header>

            <section class="glass rounded-[2rem] p-6 shadow-xl shadow-slate-900/10">
                <div class="split-grid gap-4">
                    <div class="space-y-4">
                        <label class="block text-slate-300 text-sm font-semibold">Search title or artist</label>
                        <input id="search-input" type="search" placeholder="Search songs, artists, genres..." class="w-full rounded-3xl px-5 py-3 text-white outline-none focus:ring-2 focus:ring-violet-500" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-4">
                            <label class="block text-slate-300 text-sm font-semibold">Genre</label>
                            <select id="genre-filter" class="w-full rounded-3xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-violet-500">
                                <option value="">All genres</option>
                            </select>
                        </div>
                        <div class="space-y-4">
                            <label class="block text-slate-300 text-sm font-semibold">Language</label>
                            <select id="language-filter" class="w-full rounded-3xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-violet-500">
                                <option value="">All languages</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="space-y-4">
                        <label class="block text-slate-300 text-sm font-semibold">Primary emotion</label>
                        <select id="emotion-filter" class="w-full rounded-3xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-violet-500">
                            <option value="">Any emotion</option>
                        </select>
                    </div>
                    <div class="space-y-4">
                        <label class="block text-slate-300 text-sm font-semibold">Release era</label>
                        <select id="era-filter" class="w-full rounded-3xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-violet-500">
                            <option value="">Any era</option>
                        </select>
                    </div>
                    <div class="space-y-4">
                        <label class="block text-slate-300 text-sm font-semibold">Mood tag</label>
                        <select id="mood-filter" class="w-full rounded-3xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-violet-500">
                            <option value="">Any tag</option>
                        </select>
                    </div>
                </div>
                <div class="mt-5 flex flex-wrap items-center gap-3 text-slate-400 text-sm">
                    <span class="filter-pill">Showing <strong id="match-count">0</strong> tracks</span>
                    <span class="filter-pill">Filtering from <strong id="total-count">0</strong> total</span>
                </div>
            </section>

            <section class="glass rounded-[2rem] p-6 shadow-xl shadow-slate-900/10">
                <div id="songs-grid" class="grid gap-5 xl:grid-cols-3 lg:grid-cols-2"></div>
                <div id="empty-state" class="mt-8 hidden rounded-3xl border border-dashed border-slate-700 bg-slate-950/40 p-8 text-center text-slate-400">
                    <p class="text-lg font-semibold text-white">No songs match these filters.</p>
                    <p class="mt-2 text-sm">Clear some filters or broaden your search to see more recommendations.</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        const state = {
            songs: [],
            filters: {
                search: '',
                genre: '',
                language: '',
                emotion: '',
                era: '',
                mood: '',
            },
        };

        const elements = {
            search: document.getElementById('search-input'),
            genre: document.getElementById('genre-filter'),
            language: document.getElementById('language-filter'),
            emotion: document.getElementById('emotion-filter'),
            era: document.getElementById('era-filter'),
            mood: document.getElementById('mood-filter'),
            songsGrid: document.getElementById('songs-grid'),
            songCount: document.getElementById('song-count'),
            totalCount: document.getElementById('total-count'),
            matchCount: document.getElementById('match-count'),
            emptyState: document.getElementById('empty-state'),
        };

        function normalize(value) {
            return String(value || '').toLowerCase();
        }

        function uniqueValues(items) {
            return Array.from(new Set(items)).sort((a, b) => a.localeCompare(b));
        }

        function renderFilters() {
            const genres = uniqueValues(state.songs.map(song => song.genre).filter(Boolean));
            const languages = uniqueValues(state.songs.map(song => song.language).filter(Boolean));
            const emotions = uniqueValues(state.songs.map(song => song.primary_emotion).filter(Boolean));
            const eras = uniqueValues(state.songs.map(song => song.release_era).filter(Boolean));
            const moods = uniqueValues(state.songs.flatMap(song => song.mood_tags || []).filter(Boolean));

            populateSelect(elements.genre, genres, 'All genres');
            populateSelect(elements.language, languages, 'All languages');
            populateSelect(elements.emotion, emotions, 'Any emotion');
            populateSelect(elements.era, eras, 'Any era');
            populateSelect(elements.mood, moods, 'Any tag');
        }

        function populateSelect(select, values, defaultLabel) {
            select.innerHTML = `<option value="">${defaultLabel}</option>` + values.map(value => `<option value="${value}">${capitalize(value)}</option>`).join('');
            if (state.filters[select.id.replace('-filter', '')]) {
                select.value = state.filters[select.id.replace('-filter', '')];
            }
        }

        function capitalize(value) {
            return String(value).replace(/\b\w/g, char => char.toUpperCase());
        }

        function filterSongs() {
            const search = normalize(state.filters.search);
            const filtered = state.songs.filter(song => {
                const title = normalize(song.title);
                const artistNames = normalize((song.artists || []).join(' '));
                const genre = normalize(song.genre);
                const language = normalize(song.language);
                const emotion = normalize(song.primary_emotion);
                const era = normalize(song.release_era);
                const moods = normalize((song.mood_tags || []).join(' '));

                const searchMatch = !search || title.includes(search) || artistNames.includes(search) || genre.includes(search) || language.includes(search);
                const genreMatch = !state.filters.genre || genre === state.filters.genre;
                const languageMatch = !state.filters.language || language === state.filters.language;
                const emotionMatch = !state.filters.emotion || emotion === state.filters.emotion;
                const eraMatch = !state.filters.era || era === state.filters.era;
                const moodMatch = !state.filters.mood || moods.includes(state.filters.mood);

                return searchMatch && genreMatch && languageMatch && emotionMatch && eraMatch && moodMatch;
            });

            elements.matchCount.textContent = filtered.length;
            elements.totalCount.textContent = state.songs.length;
            elements.emptyState.classList.toggle('hidden', filtered.length !== 0);
            renderSongCards(filtered);
        }

        function renderSongCards(songs) {
            elements.songsGrid.innerHTML = songs.map(song => {
                const artists = (song.artists || []).join(', ');
                const moodTags = (song.mood_tags || []).map(tag => `<span class="px-3 py-1 rounded-full bg-white/5 text-xs font-semibold text-slate-200">${capitalize(tag)}</span>`).join(' ');
                const activityTags = (song.activity_tags || []).map(tag => `<span class="px-3 py-1 rounded-full bg-slate-800/80 text-xs text-slate-300">${capitalize(tag)}</span>`).join(' ');
                return `
                <article class="card glass rounded-[2rem] p-6 shadow-2xl shadow-slate-900/40">
                    <div class="flex items-start justify-between gap-4">
                        <div>
                            <p class="text-sm uppercase tracking-[0.3em] text-violet-300 font-semibold">${capitalize(song.primary_emotion)}</p>
                            <h2 class="mt-3 text-2xl font-bold text-white">${song.title}</h2>
                            <p class="mt-3 text-sm text-slate-300">${artists}</p>
                        </div>
                        <div class="text-right text-slate-400 text-xs leading-5">
                            <p>${capitalize(song.genre)}</p>
                            <p class="mt-2">${capitalize(song.language)}</p>
                            <p class="mt-2">${capitalize(song.release_era)}</p>
                        </div>
                    </div>
                    <div class="mt-6 grid gap-2 text-xs text-slate-300">
                        <div class="flex flex-wrap gap-2">${moodTags}</div>
                        <div class="flex flex-wrap gap-2 mt-2">${activityTags}</div>
                    </div>
                    <div class="mt-6 flex flex-wrap gap-3 text-slate-400 text-xs">
                        <span class="filter-pill">Energy ${song.energy_level ?? '—'}</span>
                        <span class="filter-pill">Speed ${song.speed ?? '—'}</span>
                        <span class="filter-pill">Dance ${song.danceability ?? '—'}</span>
                    </div>
                    <div class="mt-6 flex flex-wrap gap-3 items-center justify-between">
                        <a href="${song.yt_music_link || '#'}" target="_blank" class="inline-flex items-center justify-center rounded-full bg-violet-500 px-4 py-2 text-xs font-semibold text-white transition hover:bg-violet-400">Open in YT Music</a>
                        <span class="text-[11px] uppercase tracking-[0.2em] text-slate-500">Score ${Math.round((song.popularity_score ?? 0) * 100)}%</span>
                    </div>
                </article>`;
            }).join('');

            elements.songCount.textContent = songs.length;
        }

        function attachEventListeners() {
            elements.search.addEventListener('input', event => {
                state.filters.search = event.target.value;
                filterSongs();
            });
            ['genre', 'language', 'emotion', 'era', 'mood'].forEach(key => {
                elements[key].addEventListener('change', event => {
                    state.filters[key] = event.target.value;
                    filterSongs();
                });
            });
        }

        async function loadSongs() {
            try {
                const response = await fetch('/songs.json');
                state.songs = await response.json();
                document.getElementById('total-count').textContent = state.songs.length;
                renderFilters();
                filterSongs();
                attachEventListeners();
            } catch (error) {
                elements.songsGrid.innerHTML = '<div class="col-span-full rounded-3xl bg-red-500/10 border border-red-500/20 p-8 text-center text-red-100">Unable to load songs. Please refresh this page.</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadSongs);
    </script>
</body>
</html>
